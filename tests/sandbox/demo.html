<!doctype html>
<html>
<head>
<style>
  .btn {
    padding: 12px 16px;
    font-size: 16px;
    cursor: pointer;

    /* `& svg`  ==  Tailwind [&_svg]
       & = ".btn" (this element), the space = a descendant svg */
    & svg {
      transition: transform 300ms ease;
    }

    /* `&:active svg`  ==  Tailwind active:[&_svg]
       "when .btn is pressed, rotate its descendant svg" */
    &:active svg {
      transform: rotate(90deg);
    }
  }
</style>
</head>
<body>
  <button class="btn">
    Rotate
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="black" stroke-width="2">
      <path d="M21 12a9 9 0 1 1-3-6.7" />
      <path d="M21 3v5h-5" />
    </svg>
  </button>
</body>
</html>
